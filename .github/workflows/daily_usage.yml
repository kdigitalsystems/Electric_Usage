name: Daily Electricity Tracker

on:
  schedule:
    # Runs at 00:00 UTC every day
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  track_usage:
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          python3 -m venv venv
          source venv/bin/activate
          pip install -r requirements.txt

      - name: Run tracking script
        run: |
          # You have to activate the venv again in this new step
          source venv/bin/activate
          python3 kasa_logger.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add server_power_usage.csv 
          git commit -m "Update electricity usage for $(date +'%Y-%m-%d')" || exit 0
          git push
